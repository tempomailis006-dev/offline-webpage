<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeMediaLibrary — Currently Offline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent: #7c3aed;
            --accent-glow: rgba(124,58,237,.3);
            --border: #2a2a3a;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,58,237,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,58,237,.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,58,237,.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            padding: 40px 32px;
        }

        /* Animated server icon */
        .server-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            position: relative;
        }

        .server-box {
            width: 100px;
            height: 30px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
            margin: 0 auto 6px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 6px;
            animation: serverFloat 3s ease-in-out infinite;
        }

        .server-box:nth-child(2) { animation-delay: 0.15s; }
        .server-box:nth-child(3) { animation-delay: 0.3s; }

        @keyframes serverFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .server-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: ledBlink 2s ease-in-out infinite;
        }

        .server-led.off {
            background: #ef4444;
            animation: ledOff 1.5s ease-in-out infinite;
        }

        @keyframes ledBlink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        @keyframes ledOff {
            0%, 100% { opacity: 0.6; box-shadow: 0 0 6px rgba(239,68,68,.4); }
            50% { opacity: 1; box-shadow: 0 0 12px rgba(239,68,68,.6); }
        }

        .server-lines {
            display: flex;
            gap: 3px;
            flex: 1;
            justify-content: flex-end;
        }

        .server-line {
            width: 12px;
            height: 3px;
            border-radius: 2px;
            background: var(--border);
        }

        /* Logo */
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 32px;
            color: var(--text-primary);
        }

        .logo-icon { font-size: 2.2rem; }
        .logo-accent { color: var(--accent); }

        /* Title and message */
        .title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .message strong {
            color: var(--text-primary);
        }

        /* Status card */
        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 32px;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }

        .status-row + .status-row {
            border-top: 1px solid var(--border);
        }

        .status-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-value {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-offline {
            background: rgba(239,68,68,0.15);
            color: #ef4444;
        }

        .dot-offline {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* Retry button */
        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font);
        }

        .retry-btn:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .retry-icon {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .retry-btn:hover .retry-icon {
            transform: rotate(180deg);
        }

        /* Footer hint */
        .hint {
            margin-top: 32px;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .hint a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Auto-retry countdown */
        .auto-retry {
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .countdown {
            color: var(--accent);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 600px) {
            .container { padding: 24px 20px; }
            .title { font-size: 1.5rem; }
            .message { font-size: 0.95rem; }
            .logo { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="container">
    <div class="server-icon">
        <div class="server-box">
            <div class="server-led off"></div>
            <div class="server-lines">
                <div class="server-line"></div>
                <div class="server-line"></div>
                <div class="server-line"></div>
            </div>
        </div>
        <div class="server-box">
            <div class="server-led off"></div>
            <div class="server-lines">
                <div class="server-line"></div>
                <div class="server-line"></div>
                <div class="server-line"></div>
            </div>
        </div>
        <div class="server-box">
            <div class="server-led off"></div>
            <div class="server-lines">
                <div class="server-line"></div>
                <div class="server-line"></div>
                <div class="server-line"></div>
            </div>
        </div>
    </div>

    <div class="logo">
        <span class="logo-icon">🎬</span>
        <span>Meme Media <span class="logo-accent">Library</span></span>
    </div>

    <h1 class="title">Server is Currently Offline</h1>

    <p class="message">
        The owner hasn't started the server yet.<br>
        <strong>Please come back later</strong> — the server will be online shortly.
    </p>

    <div class="status-card">
        <div class="status-row">
            <span class="status-label">Server Status</span>
            <span class="status-badge status-offline">
                <span class="dot-offline"></span>
                Offline
            </span>
        </div>
        <div class="status-row">
            <span class="status-label">Checked At</span>
            <span class="status-value" id="checked-time">—</span>
        </div>
    </div>

    <button class="retry-btn" onclick="checkServer()">
        <svg class="retry-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v6h6"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
        Try Again
    </button>

<script>
    // Display current time
    document.getElementById('checked-time').textContent = new Date().toLocaleTimeString();

    function checkServer() {
        // Since this page is hosted on secure HTTPS (GitHub), modern browsers strictly 
        // block background fetch() requests to insecure HTTP (your local server).
        // Therefore, we cannot auto-poll. We simply redirect the user back to the 
        // local site when they click the button. If it's online, it works!
        window.location.href = 'http://MemeMediaLibrary.local';
    }
</script>
</body>
</html>
